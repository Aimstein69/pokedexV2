<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pokédex — Inscription</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a14;
      --panel: #13132a;
      --border: rgba(255,255,255,0.08);
      --text: #f0f0ff;
      --muted: #7777aa;
      --accent: #ffcb05;
      --red: #e63946;
      --green: #4ade80;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    /* Étoiles */
    .stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .star  { position: absolute; background: #fff; border-radius: 50%; animation: twinkle var(--d) ease-in-out infinite var(--delay); }
    @keyframes twinkle { 0%,100%{ opacity:.1; } 50%{ opacity:.8; } }

    .card {
      position: relative; z-index: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
      animation: slideUp 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
    }
    @keyframes slideUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:none; } }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo img { width: 70px; filter: drop-shadow(0 0 16px rgba(220,50,50,0.5)); margin-bottom: 0.8rem; }
    .logo h1 { font-family: 'Press Start 2P', monospace; font-size: 0.85rem; color: var(--accent); text-shadow: 2px 2px 0 #a07800; letter-spacing: 2px; }
    .logo p  { font-size: 0.78rem; color: var(--muted); margin-top: 0.4rem; }

    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: 0.78rem; font-weight: 700; color: var(--muted); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.5px; }

    input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    input:focus { border-color: var(--accent); background: rgba(255,203,5,0.05); }
    input.error { border-color: var(--red); }
    input.success { border-color: var(--green); }

    .field-error { font-size: 0.72rem; color: var(--red); margin-top: 0.3rem; display: none; }
    .field-error.show { display: block; }

    .btn {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), #ff9a00);
      border: none;
      border-radius: 12px;
      color: #000;
      cursor: pointer;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 1rem;
      margin-top: 0.5rem;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      letter-spacing: 1px;
    }
    .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,203,5,0.3); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .alert {
      border-radius: 10px;
      font-size: 0.82rem;
      padding: 0.7rem 1rem;
      margin-bottom: 1rem;
      display: none;
      font-weight: 700;
    }
    .alert.show  { display: block; }
    .alert.error { background: rgba(230,57,70,0.15); border: 1px solid rgba(230,57,70,0.4); color: #f87171; }
    .alert.ok    { background: rgba(74,222,128,0.15); border: 1px solid rgba(74,222,128,0.4); color: var(--green); }

    .divider { text-align: center; margin: 1.2rem 0; color: var(--muted); font-size: 0.78rem; position: relative; }
    .divider::before, .divider::after { content:''; position:absolute; top:50%; width:40%; height:1px; background:var(--border); }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    .link-btn {
      display: block; text-align: center;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 700;
      padding: 0.75rem;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
    }
    .link-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 6px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="card">
  <div class="logo">
    <img src="../assets/images/pokebola.webp" alt="Pokeball"/>
    <h1>Pokédex</h1>
    <p>Crée ton compte Dresseur</p>
  </div>

  <div class="alert" id="alert"></div>

  <form id="registerForm" novalidate>

    <div class="form-group">
      <label for="username">Pseudo</label>
      <input type="text" id="username" name="username" placeholder="Ash Ketchum" autocomplete="off"/>
      <div class="field-error" id="err-username"></div>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="ash@pokemon.com"/>
      <div class="field-error" id="err-email"></div>
    </div>

    <div class="form-group">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" name="password" placeholder="••••••••"/>
      <div class="field-error" id="err-password"></div>
    </div>

    <div class="form-group">
      <label for="confirm">Confirmer le mot de passe</label>
      <input type="password" id="confirm" name="confirm" placeholder="••••••••"/>
      <div class="field-error" id="err-confirm"></div>
    </div>

    <button type="submit" class="btn" id="submitBtn">Devenir Dresseur !</button>

  </form>

  <div class="divider">ou</div>
  <a href="Login.html" class="link-btn">J'ai déjà un compte</a>
</div>

<script>
// ── Étoiles ───────────────────────────────────────────
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2 + 0.5;
  s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${Math.random()*3+2}s;--delay:${Math.random()*3}s`;
  starsEl.appendChild(s);
}

// ── Redirection si déjà connecté ─────────────────────
/* (DÉSACTIVÉ TEMPORAIREMENT)

  const token = localStorage.getItem('token');
  if (!token) return;
  
  try {
    const response = await fetch('/api/auth/me', {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (response.ok) {
      window.location.href = 'index.html';
    } else {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
    }
  } catch (err) {
    console.error('Erreur de vérification du token');
  }
}
checkAuth();
*/

// ── Formulaire ────────────────────────────────────────
const form       = document.getElementById('registerForm');
const submitBtn  = document.getElementById('submitBtn');
const alertBox   = document.getElementById('alert');

function showAlert(msg, type) {
  alertBox.textContent = msg;
  alertBox.className   = `alert show ${type}`;
}

function showFieldError(fieldId, msg) {
  const el = document.getElementById(`err-${fieldId}`);
  const input = document.getElementById(fieldId);
  el.textContent = msg;
  el.classList.add('show');
  input.classList.add('error');
}

function clearErrors() {
  document.querySelectorAll('.field-error').forEach(e => { e.textContent = ''; e.classList.remove('show'); });
  document.querySelectorAll('input').forEach(i => i.classList.remove('error', 'success'));
  alertBox.className = 'alert';
}

function validateForm(username, email, password, confirm) {
  let valid = true;
  if (!username || username.length < 3) { showFieldError('username', 'Minimum 3 caractères'); valid = false; }
  if (!email || !/^\S+@\S+\.\S+$/.test(email)) { showFieldError('email', 'Email invalide'); valid = false; }
  if (!password || password.length < 6) { showFieldError('password', 'Minimum 6 caractères'); valid = false; }
  if (password !== confirm) { showFieldError('confirm', 'Les mots de passe ne correspondent pas'); valid = false; }
  return valid;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  clearErrors();

  const username = document.getElementById('username').value.trim();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirm  = document.getElementById('confirm').value;

  if (!validateForm(username, email, password, confirm)) return;

  // Désactiver le bouton pendant l'envoi
  submitBtn.disabled   = true;
  submitBtn.innerHTML  = '<span class="spinner"></span>Création en cours…';

  try {
    const response = await fetch('/api/auth/register', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ username, email, password })
    });

    const data = await response.json();

    if (!response.ok) {
      showAlert(data.message || 'Erreur lors de l\'inscription', 'error');
      return;
    }

    // ✅ Inscription réussie : sauvegarder le token et rediriger
    localStorage.setItem('token', data.token);
    localStorage.setItem('user',  JSON.stringify(data.user));

    showAlert(`✅ Bienvenue ${data.user.username} ! Redirection…`, 'ok');

    setTimeout(() => {
      window.location.href = 'Login.html';
    }, 1500);

  } catch (err) {
    showAlert('Impossible de contacter le serveur. Vérifie ta connexion.', 'error');
  } finally {
    submitBtn.disabled  = false;
    submitBtn.innerHTML = 'Devenir Dresseur !';
  }
});
</script>
</body>
</html>
